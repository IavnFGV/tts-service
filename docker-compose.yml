services:
  tts:
    build:
      context: .
    env_file:
      - .env
    environment:
      # Container runtime path differs from local direct Python execution.
      TTS_VOICE_DIR: "/data/voices"
    expose:
      - "8000"
    volumes:
      - /srv/services/tts/voices:/data/voices
    restart: unless-stopped
    networks:
      edge:
        aliases:
          - tts-service

networks:
  edge:
    external: true
    name: edge
