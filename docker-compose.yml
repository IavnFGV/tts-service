services:
  tts:
    build:
      context: .
    environment:
      TTS_HOST: "0.0.0.0"
      TTS_PORT: "8000"
      TTS_VOICE_DIR: "/data/voices"
      TTS_MAX_CONCURRENT_SYNTHESIS: "1"
      TTS_SYNTHESIS_TIMEOUT_SEC: "120"
    expose:
      - "8000"
    volumes:
      - /srv/services/tts/voices:/data/voices
    restart: unless-stopped
    networks:
      edge:
        aliases:
          - tts-service

networks:
  edge:
    external: true
    name: edge
