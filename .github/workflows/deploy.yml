name: Deploy service to VPS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx2

      - name: Run tests
        run: python -m pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            SERVICE_NAME="tts-service"
            STACKS_DIR="/opt/dockge/stacks"
            SERVICE_DIR="${STACKS_DIR}/${SERVICE_NAME}"
            VOICE_ROOT="/srv/services/tts/voices"

            log_dir_state() {
              local path="$1"
              if sudo test -d "${path}"; then
                echo "[deploy] directory already exists: ${path}"
              else
                echo "[deploy] directory will be created: ${path}"
              fi
            }

            show_dir_state() {
              local path="$1"
              echo "[deploy] ls -ld ${path}"
              sudo ls -ld "${path}" || true
            }

            echo "[deploy] service=${SERVICE_NAME}"
            echo "[deploy] stacks_dir=${STACKS_DIR}"
            echo "[deploy] service_dir=${SERVICE_DIR}"
            sudo mkdir -p "${STACKS_DIR}"
            log_dir_state "${SERVICE_DIR}"
            sudo mkdir -p "${SERVICE_DIR}"
            sudo chown -R "${USER}:${USER}" "${SERVICE_DIR}"
            show_dir_state "${STACKS_DIR}"
            show_dir_state "${SERVICE_DIR}"

            if [ ! -d "${SERVICE_DIR}/.git" ]; then
              echo "[deploy] cloning repository into ${SERVICE_DIR}"
              rm -rf "${SERVICE_DIR}"
              git clone "https://github.com/${{ github.repository }}.git" "${SERVICE_DIR}"
            else
              echo "[deploy] repository already present in ${SERVICE_DIR}"
            fi

            cd "${SERVICE_DIR}"
            echo "[deploy] current revision before fetch: $(git rev-parse --short HEAD 2>/dev/null || echo missing)"

            git fetch --all --prune
            git reset --hard origin/main
            echo "[deploy] current revision after reset: $(git rev-parse --short HEAD)"

            if [ ! -f .env ]; then
              echo "ERROR: .env is missing in ${SERVICE_DIR}. Create it manually on the VPS before deploy."
              exit 1
            fi
            echo "[deploy] found ${SERVICE_DIR}/.env"

            log_dir_state "${VOICE_ROOT}"
            sudo mkdir -p "${VOICE_ROOT}"
            sudo chown -R "${USER}:${USER}" "${VOICE_ROOT}" || true
            sudo chown -R "${USER}:${USER}" "${SERVICE_DIR}" || true
            show_dir_state "${VOICE_ROOT}"

            export TTS_SERVICE_VERSION="main-${{ github.run_number }}"
            export TTS_SERVICE_GIT_COMMIT="${{ github.sha }}"
            export TTS_SERVICE_BUILD_TIME_UTC="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            export TTS_SERVICE_BUILD_REF="${{ github.ref }}"
            export TTS_SERVICE_ENV_NAME="production"

            if docker network inspect edge >/dev/null 2>&1; then
              echo "[deploy] docker network already exists: edge"
            else
              echo "[deploy] creating docker network: edge"
              docker network create edge
            fi

            echo "[deploy] running docker compose up -d --build"
            docker compose up -d --build
            echo "[deploy] docker compose ps"
            docker compose ps
